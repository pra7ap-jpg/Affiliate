<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>LinkFeed | Private</title>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f4f0; padding: 40px; color: #111; 
            /* Disable text selection */
            -webkit-user-select: none; user-select: none;
        }
        .admin-box { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border: 3px solid #111; border-radius: 16px; box-shadow: 6px 6px 0px #111; }
        textarea, select, button { width: 100%; margin-bottom: 20px; padding: 12px; border: 3px solid #111; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 1rem; box-sizing: border-box; }
        button { background: #baff29; cursor: pointer; transition: 0.2s; }
        #status { font-weight: 800; text-align: left; margin-top: 10px; line-height: 1.5; white-space: pre-wrap;}
    </style>
</head>
<body oncontextmenu="return false;"> <div class="admin-box" id="authBox">
        <h2>Enter Admin Password</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkPassword()">Access Feed</button>
    </div>

    <div class="admin-box" id="feedBox" style="display:none;">
        <h2>Bulk Add Deals</h2>
        <textarea id="urls" rows="6"></textarea>
        <select id="category">
            <option value="Tech">Tech</option>
            <option value="Audio">Audio</option>
            <option value="Lifestyle">Lifestyle</option>
        </select>
        <button onclick="processLinks()" id="submitBtn">Process Links</button>
        <div id="status"></div>
    </div>

    <script>
        // PASSWORD PROTECTION
        function checkPassword() {
            const pass = document.getElementById('password').value;
            // CHANGE "your_secret_password" TO WHATEVER YOU WANT
            if (pass === "your_secret_password") { 
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('feedBox').style.display = 'block';
            } else {
                alert("Incorrect Password");
            }
        }

        // Disable keyboard shortcuts for inspect (F12, Ctrl+Shift+I, etc)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });

        // ... [Insert your existing processLinks() function here] ...
    </script>
</body>
</html>
