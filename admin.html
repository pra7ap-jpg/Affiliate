<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Add Deal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f4f0; padding: 40px; color: #111; }
        .admin-box { max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border: 3px solid #111; border-radius: 16px; box-shadow: 6px 6px 0px #111; }
        input, select, button { width: 100%; margin-bottom: 20px; padding: 12px; border: 3px solid #111; border-radius: 8px; font-family: inherit; font-weight: 700; font-size: 1rem; }
        button { background: #baff29; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #111; }
        #status { font-weight: 800; text-align: center; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>Add Amazon Deal</h2>
        <input type="text" id="url" placeholder="Paste Amazon Link here">
        
        <select id="category">
            <option value="Tech">Tech</option>
            <option value="Audio">Audio</option>
            <option value="Lifestyle">Lifestyle</option>
            <option value="Gaming">Gaming</option>
        </select>

        <button onclick="addDeal()">Send to Sheet</button>
        <div id="status"></div>
    </div>

    <script>
        async function addDeal() {
            const url = document.getElementById('url').value;
            const category = document.getElementById('category').value;
            const statusEl = document.getElementById('status');
            
            statusEl.textContent = "Scraping and pushing to sheet...";
            statusEl.style.color = "#111";

            const res = await fetch('/api/add-deal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productUrl: url, category })
            });

            const data = await res.json();
            
            if (res.ok) {
                statusEl.textContent = "Success! Deal added.";
                statusEl.style.color = "green";
                document.getElementById('url').value = '';
            } else {
                statusEl.textContent = "Error: " + data.error;
                statusEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
