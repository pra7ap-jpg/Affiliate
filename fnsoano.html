<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> <meta name="robots" content="noindex, nofollow"> Admin | Auto-Scrape & Push</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .admin-box { background: #1e293b; padding: 30px; border-radius: 16px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
        label { display: block; margin-top: 20px; font-size: 0.95rem; color: #94a3b8; }
        input, select { width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; font-size: 1rem; }
        input:focus, select:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; padding: 16px; margin-top: 30px; background: #3b82f6; color: #fff; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }
        #statusMsg { display: none; margin-top: 20px; text-align: center; font-weight: 600; padding: 10px; border-radius: 8px; }
        .success { background: rgba(74, 222, 128, 0.1); color: #4ade80; border: 1px solid #4ade80; }
        .error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Auto-Scrape Deal</h2>
        
        <label>Affiliate Link (Amazon/Flipkart)</label>
        <input type="url" id="affLink" required placeholder="Paste the product link here...">

        <label>Category</label>
        <select id="category" required>
            <option value="Smartphones">Smartphones</option>
            <option value="Laptops & PC">Laptops & PC</option>
            <option value="Audio & Earbuds">Audio & Earbuds</option>
            <option value="Smartwatches">Smartwatches</option>
            <option value="Tech Accessories">Tech Accessories</option>
            <option value="Fashion & Apparel">Fashion & Apparel</option>
            <option value="Footwear">Footwear</option>
            <option value="Home & Kitchen">Home & Kitchen</option>
            <option value="Beauty & Grooming">Beauty & Grooming</option>
            <option value="Gaming">Gaming</option>
            <option value="Fitness Gear">Fitness Gear</option>
            <option value="Luggage & Bags">Luggage & Bags</option>
            <option value="Software & Subs">Software & Subs</option>
            <option value="Miscellaneous">Miscellaneous</option>
        </select>

        <button id="submitBtn" onclick="scrapeAndPush()">Scrape & Push Deal</button>
        <div id="statusMsg"></div>
    </div>

    <script>
        // Your exact API keys and Webhook
        const SCRAPER_API_KEY = '6455cbfb43dbb193447b5d8ae4ca31e4';
        const GOOGLE_WEBHOOK = 'https://script.google.com/macros/s/AKfycbyudKVJfTqmFZ7Pr33X6sWAvMhYuETeD7l_Gmz3z79dz8iSUzMp_-WTHNg1EPLiTgi8/exec';

        async function scrapeAndPush() {
            const link = document.getElementById('affLink').value.trim();
            const category = document.getElementById('category').value;
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');

            if (!link) {
                showStatus('error', 'Please paste a link first.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Scraping Data via API...';
            status.style.display = 'none';

            try {
                // 1. Fetch raw HTML using ScraperAPI to bypass bot blocks
                const scrapeUrl = `https://api.scraperapi.com/?api_key=${SCRAPER_API_KEY}&url=${encodeURIComponent(link)}`;
                const response = await fetch(scrapeUrl);
                
                if (!response.ok) throw new Error('ScraperAPI request failed.');
                const htmlText = await response.text();

                // 2. Parse the HTML to extract data
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                // Advanced selectors for Amazon & Flipkart
                const titleEl = doc.querySelector('#productTitle, .VU-ZEz, .B_NuCI, meta[property="og:title"]');
                const priceEl = doc.querySelector('.a-price-whole, .Nx9bqj, ._30jeq3');
                const imgEl = doc.querySelector('#landingImage, img.v2bfXq, img._396cs4, meta[property="og:image"]');

                const title = titleEl ? (titleEl.content || titleEl.innerText).trim() : 'Unknown Product Title';
                let price = priceEl ? priceEl.innerText.replace(/[^0-9,]/g, '') : '';
                if (price) price = '₹' + price; // Format price
                const image = imgEl ? (imgEl.src || imgEl.content) : '';

                if (!title || !image) throw new Error('Could not extract product details from this page.');

                // 3. Push extracted data to your Google Sheet
                btn.innerText = 'Pushing to Database...';

                const formData = new FormData();
                formData.append('Title', title);
                formData.append('ImageURL', image);
                formData.append('Price', price);
                formData.append('OldPrice', ''); // Automatically left blank, can be adjusted manually in sheet if needed
                formData.append('AffiliateLink', link);
                formData.append('Category', category);

                await fetch(GOOGLE_WEBHOOK, {
                    method: 'POST',
                    body: formData
                });

                showStatus('success', 'Deal Scraped & Pushed Successfully!');
                document.getElementById('affLink').value = ''; // Clear input for next deal

            } catch (error) {
                console.error(error);
                showStatus('error', 'Failed to scrape or push deal. Check the link.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Scrape & Push Deal';
            }
        }

        function showStatus(type, message) {
            const status = document.getElementById('statusMsg');
            status.className = type;
            status.innerText = message;
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
