<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | LinkFeed</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #fff; padding: 20px; display: flex; justify-content: center; -webkit-user-select: none; user-select: none; }
        .admin-box { background: #1e293b; padding: 30px; border-radius: 16px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; color: #fff; }
        label { display: block; margin-top: 20px; font-size: 0.95rem; color: #94a3b8; }
        textarea, select, input { width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; font-size: 1rem; font-family: inherit; }
        textarea:focus, select:focus, input:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; padding: 16px; margin-top: 30px; background: #3b82f6; color: #fff; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        button:hover:not(:disabled) { background: #2563eb; transform: translateY(-2px); }
        button:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: 600; line-height: 1.6; white-space: pre-wrap; font-size: 0.95rem; color: #94a3b8; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; display: none;}
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- AUTHENTICATION PANEL -->
    <div class="admin-box" id="authBox">
        <h2>Enter Admin Password</h2>
        <input type="password" id="password" placeholder="Password">
        <button onclick="checkPassword()">Access Feed</button>
    </div>

    <!-- MAIN ENGINE PANEL -->
    <div class="admin-box" id="feedBox" style="display:none;">
        <h2>Push Deals to Database</h2>
        
        <label>Bulk Link Entry (One per line)</label>
        <textarea id="urls" rows="6" placeholder="Paste Amazon, Flipkart, or Myntra links here..."></textarea>
        
        <label>Category</label>
        <select id="category">
            <option value="Smartphones">Smartphones</option>
            <option value="Laptops & PC">Laptops & PC</option>
            <option value="Audio & Earbuds">Audio & Earbuds</option>
            <option value="Smartwatches">Smartwatches</option>
            <option value="Tech Accessories">Tech Accessories</option>
            <option value="Fashion & Apparel">Fashion & Apparel</option>
            <option value="Footwear">Footwear</option>
            <option value="Home & Kitchen">Home & Kitchen</option>
            <option value="Beauty & Grooming">Beauty & Grooming</option>
            <option value="Gaming">Gaming</option>
            <option value="Fitness Gear">Fitness Gear</option>
            <option value="Luggage & Bags">Luggage & Bags</option>
            <option value="Miscellaneous">Miscellaneous</option>
        </select>
        
        <button onclick="processLinks()" id="submitBtn">Scrape & Push Links</button>
        <div id="status"></div>
    </div>

    <script>
        // PASSWORD LOGIC
        function checkPassword() {
            if (document.getElementById('password').value === "linkfeeder786") { 
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('feedBox').style.display = 'block';
            } else { 
                alert("Incorrect Password"); 
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });

        async function processLinks() {
            const urlsInput = document.getElementById('urls').value.trim();
            const category = document.getElementById('category').value;
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('submitBtn');
            const urls = urlsInput.split('\n').map(u => u.trim()).filter(u => u);
            
            if (urls.length === 0) {
                statusEl.style.display = 'block';
                statusEl.innerHTML = "<span style='color: #ef4444;'>Please paste at least one link.</span>";
                return;
            }

            btn.disabled = true;
            statusEl.style.display = 'block';
            statusEl.innerHTML = `<span style='color: #3b82f6;'>Starting process for ${urls.length} links...</span>\n\n`;

            for (let i = 0; i < urls.length; i++) {
                let url = urls[i];
                let platform = url.includes('amazon') || url.includes('amzn') ? 'Amazon' : (url.includes('flipkart') || url.includes('fkrt') ? 'Flipkart' : (url.includes('myntra') ? 'Myntra' : 'Unknown'));

                if (platform === 'Unknown') {
                    statusEl.innerHTML += `[${i+1}] Skipped: Unsupported link platform.\n`;
                    continue;
                }

                statusEl.innerHTML += `[${i+1}] Scraping ${platform}... `;

                try {
                    // YOUR ORIGINAL WORKING API CALL
                    const scraperUrl = `https://api.scraperapi.com/?api_key=6455cbfb43dbb193447b5d8ae4ca31e4&autoparse=true&premium=true&follow_redirect=true&url=${encodeURIComponent(url)}`;
                    const res = await fetch(scraperUrl);
                    const rawData = await res.text();
                    const data = JSON.parse(rawData);

                    let payload = {};

                    if (platform === 'Amazon') {
                        payload = {
                            Title: data.name || data.title || 'Untitled Amazon Product',
                            Category: category,
                            Price: data.pricing || data.price || '',
                            OldPrice: data.list_price || data.rrp || '',
                            ImageURL: (data.images && data.images[0]) ? data.images[0] : '',
                            AffiliateLink: (url.includes('amzn.to') || url.includes('amzn.in') || url.includes('tag=')) ? url : (url.includes('?') ? `${url}&tag=affindi-21` : `${url}?tag=affindi-21`)
                        };
                    } else if (platform === 'Flipkart') {
                        payload = {
                            Title: data.name || data.title || 'Untitled Flipkart Product',
                            Category: category,
                            Price: data.pricing || data.price || '',
                            OldPrice: '',
                            ImageURL: (data.images && data.images[0]) ? data.images[0] : '',
                            AffiliateLink: url.split('?')[0] 
                        };
                    } else if (platform === 'Myntra') {
                        payload = {
                            Title: data.name || data.title || 'Untitled Myntra Product',
                            Category: category,
                            Price: data.pricing || data.price || '',
                            OldPrice: data.list_price || '',
                            ImageURL: (data.images && data.images[0]) ? data.images[0] : '',
                            AffiliateLink: url.split('?')[0] 
                        };
                    }

                    // YOUR ORIGINAL WORKING WEBHOOK PUSH
                    await fetch("https://script.google.com/macros/s/AKfycbyudKVJfTqmFZ7Pr33X6sWAvMhYuETeD7l_Gmz3z79dz8iSUzMp_-WTHNg1EPLiTgi8/exec", {
                        method: "POST", 
                        mode: "no-cors", 
                        headers: { "Content-Type": "text/plain" }, 
                        body: JSON.stringify(payload)
                    });

                    statusEl.innerHTML += `<span style='color: #4ade80;'>Success! Saved to Sheet.</span>\n`;
                } catch (e) {
                    statusEl.innerHTML += `<span style='color: #ef4444;'>Error: ${e.message}</span>\n`;
                }
            }
            
            statusEl.innerHTML += `\n<span style='color: #3b82f6;'>All entries processed!</span>`;
            document.getElementById('urls').value = '';
            btn.disabled = false;
        }
    </script>
</body>
</html>
