<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curated Deals</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">Curated<span>Deals</span></a>
            <input type="text" id="searchInput" placeholder="Search products...">
        </div>
    </nav>

    <header class="hero">
        <h1>Handpicked Best Deals</h1>
        <p>Dynamic data pulled straight from Google Sheets.</p>
    </header>

    <main class="main-container">
        <section class="products-grid" id="productsGrid">
            <p style="text-align:center; grid-column: 1/-1;">Loading deals...</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
</html>
