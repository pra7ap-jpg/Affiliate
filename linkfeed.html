<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Push Deal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .admin-box { background: #1e293b; padding: 30px; border-radius: 16px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-size: 0.9rem; color: #94a3b8; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; }
        .success { color: #4ade80; display: none; margin-top: 15px; text-align: center; font-weight: 600; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Push New Deal</h2>
        
        <form id="dealForm" action="https://script.google.com/macros/s/AKfycbyudKVJfTqmFZ7Pr33X6sWAvMhYuETeD7l_Gmz3z79dz8iSUzMp_-WTHNg1EPLiTgi8/exec" method="POST">
            
            <label>Product Title</label>
            <input type="text" name="Title" required placeholder="e.g. Apple AirPods Pro">

            <label>Image URL</label>
            <input type="url" name="ImageURL" required placeholder="https://...">

            <label>Deal Price (₹)</label>
            <input type="text" name="Price" required placeholder="₹18,999">

            <label>Old Price (₹)</label>
            <input type="text" name="OldPrice" placeholder="₹24,999">

            <label>Affiliate Link</label>
            <input type="url" name="AffiliateLink" required placeholder="Paste final link here...">

            <label>Category</label>
            <select name="Category" required>
                <option value="Smartphones">Smartphones</option>
                <option value="Laptops & PC">Laptops & PC</option>
                <option value="Audio & Earbuds">Audio & Earbuds</option>
                <option value="Smartwatches">Smartwatches</option>
                <option value="Tech Accessories">Tech Accessories</option>
                <option value="Fashion & Apparel">Fashion & Apparel</option>
                <option value="Footwear">Footwear</option>
                <option value="Home & Kitchen">Home & Kitchen</option>
                <option value="Beauty & Grooming">Beauty & Grooming</option>
                <option value="Gaming">Gaming</option>
                <option value="Fitness Gear">Fitness Gear</option>
                <option value="Luggage & Bags">Luggage & Bags</option>
                <option value="Software & Subs">Software & Subs</option>
                <option value="Miscellaneous">Miscellaneous</option>
            </select>

            <button type="submit" id="submitBtn">Publish Deal</button>
            <div id="statusMsg" class="success">Deal Pushed to Database!</div>
        </form>
    </div>

    <script>
        document.getElementById('dealForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Pushing...';
            // The form will naturally submit to your webhook in the background. 
            // Setting a timeout to reset the form for the next entry.
            setTimeout(() => {
                btn.innerText = 'Publish Deal';
                document.getElementById('statusMsg').style.display = 'block';
                this.reset();
                setTimeout(() => { document.getElementById('statusMsg').style.display = 'none'; }, 3000);
            }, 1500);
        });
    </script>
</body>
</html>
